<!-- parentComponent.html -->
<template>
    <div class="slds-p-around_medium">

        <div class="slds-m-bottom_medium">
            <h1 class="slds-text-heading_large slds-m-bottom_xx-small">Polymorphic Lookup — Demo</h1>
            <p class="slds-text-body_regular slds-text-color_weak">
                Interactive examples of every major configuration. Interact with any lookup to see the enriched <code>select</code> event in the log panel.
            </p>
        </div>

        <lightning-layout multiple-rows="true" horizontal-align="space">

            <!-- ── Left column: Examples ─────────────────────────────────── -->
            <lightning-layout-item size="12" medium-device-size="7" padding="around-small">

                <!-- Example 1: Multi-object with per-object SOQL filters -->
                <lightning-card title="Example 1 — Multi-object with Filters" icon-name="standard:search">
                    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            Four object types. Active filter on Account (last 365 days) and Opportunity (Closed Won only). Demonstrates the object-switcher UI.
                        </p>
                        <c-polymorphic-lookup
                            label="Related To"
                            object-options={multiObjectOptions}
                            filter-config={multiObjectFilter}
                            dropdown-limit="5"
                            modal-limit="50"
                            onselect={handleLookupSelection}>
                        </c-polymorphic-lookup>
                    </div>
                </lightning-card>

                <!-- Example 2: Single object, showCreate, fieldLevelHelp, placeholder -->
                <lightning-card title="Example 2 — Single Object, showCreate, fieldLevelHelp" icon-name="standard:account" class="slds-m-top_small">
                    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            Account only — no object switcher. Includes a &ldquo;New Account&rdquo; option in the dropdown (<code>show-create</code>), a custom placeholder, and a field-level help tooltip.
                        </p>
                        <c-polymorphic-lookup
                            label="Account"
                            object-options={singleObjectOptions}
                            show-create
                            placeholder="Search or create an Account…"
                            field-level-help="Select the Account this record should be related to. Use 'New Account' to create one inline."
                            onselect={handleLookupSelection}>
                        </c-polymorphic-lookup>
                    </div>
                </lightning-card>

                <!-- Example 3: Required + validation -->
                <lightning-card title="Example 3 — Required Field + Validation API" icon-name="utility:check" class="slds-m-top_small">
                    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            <code>required</code> is set. Click &ldquo;Check Validity&rdquo; without selecting a record to trigger <code>reportValidity()</code> and see the inline error message.
                        </p>
                        <c-polymorphic-lookup
                            data-id="required-lookup"
                            label="Assigned To"
                            object-options={requiredObjectOptions}
                            required
                            message-when-value-missing="You must select a Contact or Lead."
                            onselect={handleLookupSelection}>
                        </c-polymorphic-lookup>
                        <div class="slds-m-top_small">
                            <lightning-button
                                variant="brand"
                                label="Check Validity"
                                onclick={handleCheckValidity}>
                            </lightning-button>
                        </div>
                    </div>
                </lightning-card>

                <!-- Example 4: Disabled toggle + label-hidden variant -->
                <lightning-card title="Example 4 — Disabled State &amp; label-hidden Variant" icon-name="utility:settings" class="slds-m-top_small">
                    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            Toggle the disabled state at runtime. The second lookup uses <code>variant="label-hidden"</code> — the label is visually hidden but still present for screen readers.
                        </p>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="slds-m-bottom_xx-small slds-text-body_small slds-text-color_weak">
                                    disabled={isDisabled}
                                </div>
                                <c-polymorphic-lookup
                                    label="Related Account"
                                    object-options={singleObjectOptions}
                                    disabled={isDisabled}
                                    onselect={handleLookupSelection}>
                                </c-polymorphic-lookup>
                                <div class="slds-m-top_small">
                                    <lightning-button
                                        label={disabledButtonLabel}
                                        onclick={handleToggleDisabled}>
                                    </lightning-button>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="slds-m-bottom_xx-small slds-text-body_small slds-text-color_weak">
                                    variant="label-hidden"
                                </div>
                                <c-polymorphic-lookup
                                    label="Related Contact"
                                    variant="label-hidden"
                                    object-options={requiredObjectOptions}
                                    placeholder="Search contacts or leads…"
                                    onselect={handleLookupSelection}>
                                </c-polymorphic-lookup>
                            </div>
                        </div>
                    </div>
                </lightning-card>

                <!-- Example 5: Multi-select cross-object -->
                <lightning-card title="Example 5 — Multi-Select (Cross-Object)" icon-name="utility:multi_select_checkbox" class="slds-m-top_small">
                    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            <code>multi-select</code> across Account, Contact, and Lead. Each pill shows the object icon.
                            The object switcher is freely changeable between picks (<code>allow-cross-object-selection</code> defaults to <code>true</code>).
                            Capped at 5 selections (<code>max-selections="5"</code>).
                        </p>
                        <c-polymorphic-lookup
                            label="Related Records"
                            object-options={multiSelectObjectOptions}
                            multi-select
                            max-selections="5"
                            onselect={handleLookupSelection}>
                        </c-polymorphic-lookup>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_medium slds-m-bottom_xx-small">
                            Same objects, <code>allow-cross-object-selection="false"</code> — switcher locks after first pick:
                        </p>
                        <c-polymorphic-lookup
                            label="Related Records (locked type)"
                            object-options={multiSelectObjectOptions}
                            multi-select
                            allow-cross-object-selection={lockedCrossObjectSelection}
                            onselect={handleLookupSelection}>
                        </c-polymorphic-lookup>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_medium slds-m-bottom_xx-small">
                            Single object + <code>multi-select</code> + <code>show-pills="false"</code> — no pill UI (parent handles display):
                        </p>
                        <c-polymorphic-lookup
                            label="Accounts (parent-managed display)"
                            object-options={singleObjectOptions}
                            multi-select
                            show-pills={noShowPills}
                            onselect={handleLookupSelection}>
                        </c-polymorphic-lookup>
                    </div>
                </lightning-card>

            </lightning-layout-item>

            <!-- ── Right column: Live event log ──────────────────────────── -->
            <lightning-layout-item size="12" medium-device-size="5" padding="around-small">
                <lightning-card title="Live select Event Log" icon-name="standard:apex_plugin">
                    <div class="slds-p-horizontal_medium" style="height: 580px; overflow-y: auto;">
                        <template if:false={selectionLog.length}>
                            <div class="slds-text-align_center slds-text-color_weak slds-p-top_large">
                                Interact with any lookup above to see the <code>select</code> event payload here…
                            </div>
                        </template>
                        <template for:each={selectionLog} for:item="log">
                            <div key={log.timestamp} class="slds-box slds-box_x-small slds-m-bottom_x-small slds-theme_shade">
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                                    <span class="slds-badge">{log.action}</span>
                                    <span class="slds-text-body_small slds-text-color_weak">{log.time}</span>
                                </div>
                                <div class="slds-text-body_small">
                                    <div><span class="slds-text-color_weak">recordId</span>&nbsp;&nbsp;&nbsp;&nbsp;<strong>{log.recordId}</strong></div>
                                    <div><span class="slds-text-color_weak">recordName</span>&nbsp;<strong>{log.recordName}</strong></div>
                                    <div><span class="slds-text-color_weak">objectType</span>&nbsp;<strong>{log.objectType}</strong></div>
                                    <div><span class="slds-text-color_weak">iconName</span>&nbsp;&nbsp;&nbsp;<strong>{log.iconName}</strong></div>
                                    <template lwc:if={log.selectedCount}>
                                        <div class="slds-m-top_xx-small" style="border-top: 1px solid #e0e0e0; padding-top: 4px;">
                                            <div><span class="slds-text-color_weak">total selected</span>&nbsp;<strong>{log.selectedCount}</strong></div>
                                            <div><span class="slds-text-color_weak">all selected</span>&nbsp;&nbsp;<strong>{log.selectedSummary}</strong></div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </lightning-card>
            </lightning-layout-item>

        </lightning-layout>
    </div>
</template>
